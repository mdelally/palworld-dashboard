services:
  palworld-dashboard:
    image: ghcr.io/mdelally/palworld-dashboard:latest
    container_name: palworld-dashboard
    ports:
      - "8787:8787"
    environment:
      PALWORLD_API_URL: ${PALWORLD_API_URL:-http://172.17.0.1:8212}
      PALWORLD_API_USER: ${PALWORLD_API_USER:-admin}
      PALWORLD_API_PASSWORD: ${PALWORLD_API_PASSWORD:-changeme}
      # Name of your Palworld game-server container. When set, logs stream from
      # its stdout via the Docker socket (Palworld logs to console, not a file).
      PALWORLD_CONTAINER: ${PALWORLD_CONTAINER:-palworld}
      PALWORLD_CONFIG_PATH: /data/PalWorldSettings.ini
      DASHBOARD_PORT: 8787
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:-}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-2000}
      # Log streaming + filtering. LOG_EXCLUDE is a regex; log lines matching it
      # are dropped before they reach the dashboard (use it to hide the
      # dashboard's own REST API poll spam). These MUST be listed here to be
      # passed into the container — compose does not forward .env / stack vars
      # it doesn't reference.
      LOG_SOURCE: ${LOG_SOURCE:-auto}
      LOG_EXCLUDE: ${LOG_EXCLUDE:-}
      LOG_BUFFER_LINES: ${LOG_BUFFER_LINES:-500}
      # Warning window (announce + save) before a restart takes the container down.
      RESTART_GRACE_SECONDS: ${RESTART_GRACE_SECONDS:-10}
    volumes:
      # Read the game container's console logs and restart it. Note: :ro only
      # protects the socket inode, not API calls, so restart still works.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Writable state owned by the dashboard (local banlist). Persists across
      # restarts and image updates.
      - palworld-dashboard-data:/data
      # Adjust this host path to your Palworld appdata (needed for the .ini editor).
      - /mnt/user/appdata/palworld/Pal/Saved/Config/LinuxServer/PalWorldSettings.ini:/data/PalWorldSettings.ini:ro
    # The container runs as non-root (USER node); grant it the host's docker
    # group so it can read /var/run/docker.sock. Verify: getent group docker
    group_add:
      - "${DOCKER_GID:-999}"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Auto-updates any container labelled watchtower.enable=true when its
  # image tag changes upstream. Remove this service if you run a single
  # Watchtower elsewhere on the host, or prefer manual re-pulls in Portainer.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
    restart: unless-stopped

volumes:
  palworld-dashboard-data:
